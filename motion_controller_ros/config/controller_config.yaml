ai_worker_controller:
  ros__parameters:
    control_frequency: 100.0
    time_step: 0.01
    trajectory_time: 0.0
    kp_position: 50.0
    kp_orientation: 50.0
    weight_position: 10.0
    weight_orientation: 1.0
    weight_elbow_position: 8.0
    weight_damping: 0.1
    collision_buffer: 0.05
    collision_safe_distance: 0.02
    slack_penalty: 1000.0
    cbf_alpha: 50.0
    reactivate_service: "/reactivate"
    joint_states_topic: "/joint_states"
    right_traj_topic: "/leader/joint_trajectory_command_broadcaster_right/joint_trajectory"
    left_traj_topic: "/leader/joint_trajectory_command_broadcaster_left/joint_trajectory"
    lift_topic: "/leader/joystick_controller_right/joint_trajectory"
    lift_vel_bound: 0.0
    r_goal_pose_topic: "/r_goal_pose"
    l_goal_pose_topic: "/l_goal_pose"
    r_elbow_pose_topic: "/r_elbow_pose"
    l_elbow_pose_topic: "/l_elbow_pose"
    r_gripper_pose_topic: "/r_gripper_pose"
    l_gripper_pose_topic: "/l_gripper_pose"
    r_gripper_name: "arm_r_link7"
    l_gripper_name: "arm_l_link7"
    r_elbow_name: "arm_r_link4"
    l_elbow_name: "arm_l_link4"
    right_gripper_joint: "gripper_r_joint1"
    left_gripper_joint: "gripper_l_joint1"
    startup_ref_pos_threshold: 0.3
    startup_ref_ori_threshold_deg: 120.0

ai_worker_wholebody_controller:
  ros__parameters:
    control_frequency: 100.0
    time_step: 0.01
    trajectory_time: 0.0
    kp_position: 50.0
    kp_orientation: 50.0
    weight_position: 10.0
    weight_orientation: 1.0
    weight_elbow_position: 8.0
    weight_damping: 0.1
    weight_damping_base: 20.0
    collision_buffer: 0.05
    collision_safe_distance: 0.02
    slack_penalty: 1000.0
    cbf_alpha: 10.0
    reactivate_topic: "/reset"  
    joint_states_topic: "/joint_states"
    right_traj_topic: "/leader/joint_trajectory_command_broadcaster_right/joint_trajectory"
    left_traj_topic: "/leader/joint_trajectory_command_broadcaster_left/joint_trajectory"
    lift_topic: "/leader/joystick_controller_right/joint_trajectory"
    lift_vel_bound: 1.0
    r_goal_pose_topic: "/r_goal_pose"
    l_goal_pose_topic: "/l_goal_pose"
    r_elbow_pose_topic: "/r_elbow_pose"
    l_elbow_pose_topic: "/l_elbow_pose"
    base_goal_pose_topic: "/vr_base_goal_pose"
    r_gripper_pose_topic: "/r_gripper_pose"
    l_gripper_pose_topic: "/l_gripper_pose"
    r_gripper_name: "arm_r_link7"
    l_gripper_name: "arm_l_link7"
    r_elbow_name: "arm_r_link4"
    l_elbow_name: "arm_l_link4"
    base_link_name: "arm_base_link"
    right_gripper_joint: "gripper_r_joint1"
    left_gripper_joint: "gripper_l_joint1"
    weight_base_position: 50.0
    weight_base_orientation: 50.0
    odom_topic: "/odom"
    cmd_vel_topic: "/cmd_vel"
    cmd_vel_in_base_frame: true
    cmd_vel_filter_tau: 0.0
    cmd_vel_max_accel_vx: 1.0
    cmd_vel_max_accel_vy: 1.0
    cmd_vel_max_accel_wz: 2.0
    base_accel_constraint_enabled: true

    # Wholebody base actuation lag model inside QP (can amplify odom twist bias)
    base_actuation_lag_comp_enabled: true
    base_actuation_tau_seconds: 0.1

joint_space_controller:
  ros__parameters:
    control_frequency: 100.0
    time_step: 0.01
    weight_tracking: 1.0
    weight_damping: 0.1
    collision_buffer: 0.05
    collision_safe_distance: 0.02
    slack_penalty: 1000.0
    cbf_alpha: 50.0
    command_timeout: 0.1
    joint_states_topic: "/joint_states"
    right_traj_topic: "/leader/joint_trajectory_command_broadcaster_right/raw_joint_trajectory"
    left_traj_topic: "/leader/joint_trajectory_command_broadcaster_left/raw_joint_trajectory"
    right_traj_filtered_topic: "/leader/joint_trajectory_command_broadcaster_right/joint_trajectory"
    left_traj_filtered_topic: "/leader/joint_trajectory_command_broadcaster_left/joint_trajectory"

leader_controller:
  ros__parameters:
    control_frequency: 100.0
    joint_states_topic: "/joint_states" 
    right_traj_topic: "/leader/joint_trajectory_command_broadcaster_right/raw_joint_trajectory"
    left_traj_topic: "/leader/joint_trajectory_command_broadcaster_left/raw_joint_trajectory"
    reactivate_service: "/reactivate"
    command_timeout: 0.1
    r_goal_pose_topic: "/r_goal_pose"
    l_goal_pose_topic: "/l_goal_pose"
    r_elbow_pose_topic: "/r_elbow_pose"
    l_elbow_pose_topic: "/l_elbow_pose"
    base_frame_id : "base_link"
    r_gripper_name: "arm_r_link7"
    l_gripper_name: "arm_l_link7"
    r_elbow_name: "arm_r_link4"
    l_elbow_name: "arm_l_link4"
    lift_joint_name: "lift_joint"
    model_lift_joint_name: "joint"

reference_checker:
  ros__parameters:
    ref_pos_jump_threshold: 0.4
    ref_ori_jump_threshold_deg: 120.0
    r_goal_pose_topic: "/r_goal_pose"
    l_goal_pose_topic: "/l_goal_pose"
