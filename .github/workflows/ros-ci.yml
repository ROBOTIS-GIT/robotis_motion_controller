name: CI

on:
  push:
    branches: [jazzy, main]
  pull_request:
    branches: [jazzy, main]

jobs:
  ros_ci:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
    steps:
      - name: Setup workspace
        run: mkdir -p ros_ws/src/robotis_interfaces

      - name: Checkout motion controller repository
        uses: actions/checkout@v4
        with:
          path: ros_ws/src

      - name: Checkout robotis_interfaces dependency
        uses: actions/checkout@v4
        with:
          repository: ROBOTIS-GIT/robotis_interfaces
          ref: feature-motion-controller
          path: ros_ws/src/robotis_interfaces

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Check and install ROS dependencies
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -y -r --rosdistro jazzy --skip-keys dynamixel_hardware_interface
          rosdep check --from-paths ros_ws/src --ignore-src --rosdistro jazzy --skip-keys dynamixel_hardware_interface

      - name: Build packages
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: jazzy
          package-name: |
            motion_controller
            motion_controller_core
            motion_controller_models
            motion_controller_ros
            motion_controller_ros_py
          skip-tests: true
