name: CI

on:
  push:
    branches: [jazzy, main]
  pull_request:
    branches: [jazzy, main]

jobs:
  ros_ci:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:noble
    steps:
      - name: Setup workspace
        run: mkdir -p ros_ws/src/robotis_interfaces

      - name: Checkout motion controller repository
        uses: actions/checkout@v4
        with:
          path: ros_ws/src/robotis_motion_controller

      - name: Checkout robotis_interfaces dependency
        uses: actions/checkout@v4
        with:
          repository: ROBOTIS-GIT/robotis_interfaces
          ref: feature-motion-controller
          path: ros_ws/src/robotis_interfaces

      - name: Setup ROS environment
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install OSQP and OsqpEigen
        shell: bash
        run: |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends git cmake build-essential pkg-config

          git clone --depth 1 https://github.com/osqp/osqp.git /tmp/osqp
          cmake -S /tmp/osqp -B /tmp/osqp/build -G "Unix Makefiles"
          cmake --build /tmp/osqp/build
          cmake --build /tmp/osqp/build --target install

          git clone --depth 1 https://github.com/robotology/osqp-eigen.git /tmp/osqp-eigen
          cmake -S /tmp/osqp-eigen -B /tmp/osqp-eigen/build -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/osqp-eigen/build
          cmake --build /tmp/osqp-eigen/build --target install

      - name: Check and install ROS dependencies
        shell: bash
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          rosdep update
          rosdep install --from-paths ros_ws/src --ignore-src -y -r --rosdistro jazzy --skip-keys "dynamixel_hardware_interface osqp-eigen"
          rosdep check --from-paths ros_ws/src --ignore-src --rosdistro jazzy --skip-keys "dynamixel_hardware_interface osqp-eigen"

      - name: Build packages
        shell: bash
        env:
          CMAKE_PREFIX_PATH: /usr/local:${{ env.CMAKE_PREFIX_PATH }}
          OsqpEigen_DIR: /usr/local/lib/cmake/OsqpEigen
          LD_LIBRARY_PATH: /usr/local/lib:${{ env.LD_LIBRARY_PATH }}
        run: |
          set -e
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          colcon build \
            --packages-up-to \
              motion_controller \
              motion_controller_core \
              motion_controller_models \
              motion_controller_ros \
              motion_controller_ros_py \
            --event-handlers=console_cohesion+ \
            --symlink-install
